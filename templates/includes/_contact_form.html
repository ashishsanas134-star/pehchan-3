<div class="contact-form-container">
    <form method="POST" action="{{ contact_form_action|default:'.' }}">
        {% csrf_token %}
        
        <div class="form-group">
            <input type="text" name="name" placeholder="Your Name" required
                value="{{ contact_form.name.value|default:'' }}" class="form-control">
            {% if contact_form.name.errors %}
            <div class="error-text">{{ contact_form.name.errors.0 }}</div>
            {% endif %}
        </div>

        <div class="form-group">
            <input type="email" name="email" placeholder="Your Email" required
                value="{{ contact_form.email.value|default:'' }}" class="form-control">
            {% if contact_form.email.errors %}
            <div class="error-text">{{ contact_form.email.errors.0 }}</div>
            {% endif %}
        </div>

        <div class="form-group">
            <textarea name="message" placeholder="Your Message" rows="5"
                required class="form-control">{{ contact_form.message.value|default:'' }}</textarea>
            {% if contact_form.message.errors %}
            <div class="error-text">{{ contact_form.message.errors.0 }}</div>
            {% endif %}
        </div>

        <button type="submit" class="btn-submit pill-button pill-button--primary" style="display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0;">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
            <span style="font-weight: 700; letter-spacing: 0.5px;">Send Message</span>
        </button>
    </form>
</div>

<style>
    .contact-form-container .form-group {
        margin-bottom: 1.5rem;
    }
    .contact-form-container .form-control {
        width: 100%;
        padding: 0.75rem 1rem;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        transition: border-color 0.3s;
        font-family: inherit;
    }
    .contact-form-container .form-control:focus {
        border-color: var(--primary-500, #4caf50);
        outline: none;
    }
    .contact-form-container .error-text {
        color: #dc3545;
        font-size: 0.875rem;
        margin-top: 0.25rem;
    }
    .contact-form-container .btn-submit {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        justify-content: center;
        width: 100%;
        margin-top: 1rem;
    }
</style>
