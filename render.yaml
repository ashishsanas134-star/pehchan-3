services:
  - type: web
    name: pehchan-webapp
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    startCommand: gunicorn pehchan_webapp.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: pehchan_webapp.settings
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: WEB_CONCURRENCY
        value: 4
